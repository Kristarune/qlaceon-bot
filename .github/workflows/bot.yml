name: Diagnostic - Check Secrets

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Check if secrets are available
        run: |
          echo "=== SECRETS DIAGNOSTIC ==="
          echo ""
          echo "DISCORD_TOKEN exists: ${{ secrets.DISCORD_TOKEN != '' }}"
          echo "CLIENT_ID exists: ${{ secrets.CLIENT_ID != '' }}"
          echo ""
          
          if [ "${{ secrets.DISCORD_TOKEN }}" != "" ]; then
            TOKEN_LEN=$(echo -n "${{ secrets.DISCORD_TOKEN }}" | wc -c)
            echo "DISCORD_TOKEN length: $TOKEN_LEN"
            echo "DISCORD_TOKEN starts with: $(echo "${{ secrets.DISCORD_TOKEN }}" | cut -c1-15)..."
          else
            echo "❌ DISCORD_TOKEN is EMPTY or NOT SET!"
          fi
          
          if [ "${{ secrets.CLIENT_ID }}" != "" ]; then
            echo "CLIENT_ID: ${{ secrets.CLIENT_ID }}"
          else
            echo "❌ CLIENT_ID is EMPTY or NOT SET!"
          fi
