name: Qarmander Bot 24/7
on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install discord.js
      - name: Create .env file
        run: |
          echo "DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}" > Sacred-Stuff.env
          echo "CLIENT_ID=${{ secrets.CLIENT_ID }}" >> Sacred-Stuff.env
      - name: Debug env (safe)
        run: |
          echo "DISCORD_TOKEN length: $(grep -c 'DISCORD_TOKEN' Sacred-Stuff.env)"
          echo "CLIENT_ID: $(grep 'CLIENT_ID' Sacred-Stuff.env | cut -d= -f2)"
      - name: Run bot
        run: node qarmander-bot.js
